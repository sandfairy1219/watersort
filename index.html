<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Sort Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="waiting-screen">
        <h1>Water Sort Game</h1>
        <button id="start-button">Start</button>
        <div>
            <button class="difficulty-button" data-difficulty="easy" id="easy">Easy</button>
            <button class="difficulty-button" data-difficulty="medium" id="medium">Medium</button>
            <button class="difficulty-button" data-difficulty="hard" id="hard">Hard</button>
        </div>
    </div>
    <div id="game-container" style="display: none;">
        <button id="reset-button">Reset</button>
        <div id="bottles-container">
            <!-- Bottles will be dynamically generated here -->
        </div>
        <div id="clear-message">Clear</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
